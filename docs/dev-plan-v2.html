<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindDo · 任务分工 v2（按页面）| Task Plan v2 (by page)</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<style>
  :root{
    --bg:#FFF5D6; --card:#fffdf7; --line:rgba(255,91,36,0.16); --text:#1a1a1a;
    --muted:#6b7280; --gold:#FFC824; --gold-deep:#E5B11D; --brand:#FF5B24;
    --ok:#6f8f57; --warn:#DC2626; --shadow:0 18px 44px rgba(0,0,0,0.10);
    --paul:#2563EB; --austin:#16A34A; --david:#9333EA;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{font-family:"Avenir Next","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;
    overflow-wrap:anywhere;word-break:break-word;}
  a{color:var(--brand);overflow-wrap:anywhere;}
  /* HEADER */
  .top{position:sticky;top:0;z-index:50;background:linear-gradient(145deg,#2a1408,#1a1a1a);
    color:#fffbeb;padding:16px 24px;box-shadow:var(--shadow);}
  .top-row{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .top h1{font-size:18px;font-weight:900;letter-spacing:-0.01em;flex:1;min-width:140px;}
  .top h1 small{display:block;font-size:11px;font-weight:600;color:rgba(254,243,199,0.7);letter-spacing:0.04em;}
  .lang-toggle{display:flex;border:1px solid rgba(254,243,199,0.3);border-radius:999px;overflow:hidden;}
  .lang-toggle button{background:transparent;color:rgba(254,243,199,0.8);border:none;padding:7px 16px;
    font:inherit;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;}
  .lang-toggle button.on{background:var(--gold);color:#1a1a1a;}
  .tabs{max-width:1080px;margin:14px auto 0;display:flex;gap:8px;flex-wrap:wrap;}
  .tab{background:rgba(255,255,255,0.08);color:rgba(254,243,199,0.85);border:1px solid rgba(254,243,199,0.2);
    border-radius:999px;padding:8px 16px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
  .tab:hover{background:rgba(255,255,255,0.16);}
  .tab.on{background:var(--gold);border-color:var(--gold-deep);color:#1a1a1a;}
  /* CONTENT */
  .wrap{max-width:1080px;margin:0 auto;padding:26px 24px 80px;}
  .lead{font-size:14px;color:#5a4a16;background:rgba(255,200,36,0.12);border:1px solid var(--line);
    border-radius:14px;padding:14px 18px;margin-bottom:22px;}
  .lead b{color:var(--brand);}
  h2.sec{font-size:20px;font-weight:900;margin:30px 0 14px;letter-spacing:-0.01em;}
  h2.sec .em{font-size:22px;margin-right:6px;}
  /* principle / note cards */
  .grid{display:grid;gap:14px;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);}
  .pcard h3{font-size:15px;font-weight:900;margin-bottom:6px;}
  .pcard p{font-size:13.5px;color:var(--muted);}
  /* track summary cards */
  .track{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow);
    border-top:5px solid var(--c);cursor:pointer;transition:.15s;}
  .track:hover{transform:translateY(-2px);box-shadow:0 22px 50px rgba(0,0,0,0.14);}
  .track .who{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .track .who .em{font-size:26px;}
  .track .who b{font-size:18px;font-weight:900;color:var(--c);}
  .track .who .role{font-size:12px;font-weight:700;color:#fff;background:var(--c);border-radius:999px;padding:2px 10px;}
  .track .serve{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .track .p0{font-size:13px;}
  .track .p0 b{color:var(--text);}
  .track .cnt{margin-top:10px;font-size:12px;color:var(--muted);font-weight:700;}
  /* existing / dont-rebuild */
  .built{background:rgba(111,143,87,0.09);border:1px solid rgba(111,143,87,0.3);border-radius:16px;padding:16px 20px;}
  .built h3{font-size:14px;font-weight:900;color:var(--ok);margin-bottom:8px;}
  .built ul{list-style:none;display:flex;flex-wrap:wrap;gap:8px;}
  .built li{font-size:12.5px;background:#fff;border:1px solid rgba(111,143,87,0.3);border-radius:999px;
    padding:4px 11px;color:#3f5a2e;font-weight:600;}
  .built li::before{content:"✓ ";color:var(--ok);font-weight:900;}
  /* dev detail table */
  .devhead{display:flex;align-items:center;gap:12px;margin:6px 0 14px;}
  .devhead .em{font-size:30px;}
  .devhead b{font-size:20px;font-weight:900;color:var(--c);}
  .devhead .role{font-size:12.5px;font-weight:700;color:#fff;background:var(--c);border-radius:999px;padding:3px 12px;}
  table{border-collapse:collapse;width:100%;margin:6px 0 8px;font-size:13.5px;background:var(--card);
    border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  thead th{background:var(--c);color:#fff;padding:9px 12px;text-align:left;font-weight:800;font-size:12.5px;}
  td{border-bottom:1px solid var(--line);padding:9px 12px;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:nth-child(even) td{background:rgba(255,200,36,0.05);}
  td.pg{white-space:nowrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;font-weight:700;}
  td.pg a{color:var(--c);text-decoration:none;border-bottom:1px dotted var(--c);}
  .pri{display:inline-block;font-size:11px;font-weight:900;border-radius:6px;padding:2px 8px;white-space:nowrap;}
  .pri.P0{background:#FEE2E2;color:#B91C1C;}
  .pri.P1{background:#FEF3C7;color:#92400E;}
  .pri.later{background:#E5E7EB;color:#4B5563;}
  .reuse{display:inline-block;font-size:11.5px;color:var(--ok);background:rgba(111,143,87,0.12);
    border-radius:6px;padding:1px 7px;font-weight:700;margin-top:3px;}
  /* milestones */
  .ms{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin:10px 0;
    border-left:5px solid var(--gold-deep);box-shadow:var(--shadow);}
  .ms h4{font-size:14px;font-weight:900;}
  .ms h4 .wk{color:var(--brand);}
  .ms h4 .dt{font-size:12px;color:var(--muted);font-weight:600;margin-left:8px;}
  .ms p{font-size:13px;color:var(--muted);margin-top:4px;}
  /* status tree */
  .stcat{font-size:17px;font-weight:900;margin:24px 0 8px;letter-spacing:-0.01em;}
  .stgrp{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 16px;margin:8px 0;box-shadow:var(--shadow);}
  .stgrp h4{font-size:12px;font-weight:800;color:var(--gold-deep);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
  .stitem{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px;}
  .stitem:last-child{border-bottom:none;}
  .stitem .lbl{flex:1;}
  .stitem.done .lbl{text-decoration:line-through;text-decoration-color:var(--ok);color:var(--muted);}
  .stnote{font-size:12px;color:var(--muted);font-style:italic;}
  .sbadge{font-size:11px;font-weight:900;border-radius:6px;padding:2px 9px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
  .sbadge.done{background:rgba(111,143,87,0.15);color:var(--ok);}
  .sbadge.fix,.sbadge.todo{background:#FEE2E2;color:#B91C1C;}
  .sbadge.skeleton{background:#DBEAFE;color:#1D4ED8;}
  .sbadge.partial{background:#FEF3C7;color:#92400E;}
  .sbadge.temp{background:#E5E7EB;color:#4B5563;}
  .hideMe{display:none !important;}
  .updated{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;}
  @media(max-width:820px){
    .g3,.g2{grid-template-columns:1fr;}
  }
  @media(max-width:760px){
    .top{padding:12px 14px;} .top h1{font-size:16px;}
    .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{flex:0 0 auto;}
    .wrap{padding:16px 12px 60px;}
    table{font-size:12.5px;display:block;overflow-x:auto;white-space:nowrap;}
  }
</style>
</head>

        w:{zh:"维护 / 微调现有用户 · 课程 · 试课 · 机构 · 讲师后台（已建好，按需补）。",en:"Maintain existing users · courses · trials · orgs · instructors admin (already built — top up as needed)."},
        reuse:{zh:"已建好，别重做",en:"Already built — don't redo"} },
      { pg:"后端基建", pri:"P1",
        w:{zh:"分页 / 全局异常过滤 / 审计日志 / seed 脚本 / 后端 CI —— 给三条线打地基。",en:"Pagination / global exception filter / audit log / seed script / backend CI — foundation for all three tracks."} },
    ]
  },
];

/* ============ STATUS (team's actual progress, from feedback) ============ */

  done:{zh:"完成",en:"Done"}, fix:{zh:"待修权限",en:"Fix"}, skeleton:{zh:"骨架",en:"Skeleton"},
  partial:{zh:"部分",en:"Partial"}, temp:{zh:"临时",en:"Temp"}, todo:{zh:"待办",en:"To do"},
};
const STATUS = [
  { cat:{zh:"基建 Infra",en:"Infra"}, em:"🛠", groups:[
    { g:"CI / CD", items:[
      { t:"Frontend → S3", s:"done" },
      { t:"Backend → Railway", s:"done" },
    ]},
    { g:"Domain", items:[
      { t:"Namecheap + Route53", s:"done" },
      { t:"Subdomain setup", s:"todo", note:{zh:"需把 admin.minddo.ai 转为根域",en:"convert admin.minddo.ai to root"} },
    ]},
    { g:"DB", items:[
      { t:"Supabase 主库 / main DB", s:"done" },
      { t:"MongoDB scheduler (Agenda)", s:"temp", note:{zh:"临时方案",en:"temporary"} },
      { t:"Mailgun", s:"done" },
    ]},
  ]},
  { cat:{zh:"系统 System",en:"System"}, em:"🔐", groups:[
    { g:"Auth", items:[
      { t:"Auth0 — email/password + Google", s:"done" },
      { t:"Auth table", s:"done" },

      { t:"Permission-based API", s:"done" },
    ]},
  ]},
  { cat:{zh:"界面 UI",en:"UI"}, em:"🖥", groups:[
    { g:{zh:"落地页（公开）Landing",en:"Landing (public)"}, items:[
      { t:"Home landing", s:"done" },
      { t:"Trial page", s:"done" },
    ]},
    { g:{zh:"面板 · 学生 Student",en:"Dashboard · Student"}, items:[
      { t:"Profile page", s:"done" },

    ]},
    { g:{zh:"面板 · 家长 Parent",en:"Dashboard · Parent"}, items:[
      { t:"Profile page", s:"done" },
      { t:"Family page", s:"partial", note:{zh:"基本完成，待小修",en:"mostly done, quick fix"} },
      { t:"Course page", s:"skeleton", note:{zh:"骨架",en:"skeleton only"} },
    ]},
    { g:{zh:"面板 · 讲师 Instructor",en:"Dashboard · Instructor"}, items:[
      { t:"Profile page", s:"done" },

    ]},
    { g:{zh:"面板 · 机构管理 Org_Admin",en:"Dashboard · Org_Admin"}, items:[

      { t:"Instructor + CRUD", s:"done" },
      { t:"Account + CRUD", s:"done" },
      { t:"Contact Request", s:"done" },
    ]},
  ]},
  { cat:{zh:"流程 Flow",en:"Flow"}, em:"🔀", groups:[
    { g:"—", items:[
      { t:"Trial signup", s:"partial", note:{zh:"部分完成，缺后续邀请 + 注册机制",en:"partial; needs later invite + signup mechanism"} },

function statusView(){
  let done=0,total=0;
  STATUS.forEach(c=>c.groups.forEach(g=>g.items.forEach(i=>{total++;if(i.s==="done")done++;})));
  const pct = Math.round(done/total*100);
  const body = STATUS.map(c=>{
    const groups = c.groups.map(g=>{
      const gname = (typeof g.g==="string") ? g.g : tt(g.g);
      const items = g.items.map(i=>{
        const note = i.note ? `<span class="stnote"> — ${tt(i.note)}</span>` : "";
        return `<div class="stitem ${i.s==="done"?"done":""}">
          <span class="lbl">${i.t}${note}</span>
          <span class="sbadge ${i.s}">${tt(SLABEL[i.s])}</span></div>`;
      }).join("");
      return `<div class="stgrp">${gname!=="—"?`<h4>${gname}</h4>`:""}${items}</div>`;
    }).join("");
    return `<div class="stcat">${c.em} ${tt(c.cat)}</div>${groups}`;
  }).join("");
  return `<div class="lead">${tt(T.statusLead)} &nbsp;<b>${done}/${total} ${lang==="zh"?"已完成":"done"} · ${pct}%</b></div>${body}`;
}

/* ============ RENDER ============ */
let lang = "zh", view = "overview";
const $ = (s)=>document.querySelector(s);
const tt = (o)=>o ? (o[lang]||o.zh) : "";
const protoBase = "https://li2918.github.io/MindDo/";

function renderTabs(){
  const order=["overview","status","paul","austin","david"];
  $("#tabs").innerHTML = order.map(k=>
    `<button class="tab ${view===k?'on':''}" data-v="${k}">${tt(T.tabs[k])}</button>`).join("");
  $("#tabs").querySelectorAll(".tab").forEach(b=>b.onclick=()=>{view=b.dataset.v;render();});
}

function priLabel(p){ return p==="later" ? (lang==="zh"?"后续":"Later") : p; }

function trackCard(tr){
  return `<div class="track" style="--c:${tr.color}" data-go="${tr.id}">
    <div class="who"><span class="em">${tr.em}</span><b>${tr.name}</b>
      <span class="role">${tt(tr.role)}</span></div>
    <div class="serve">${tt(tr.serve)}</div>
    <div class="p0">${tt(tr.p0)}</div>
    <div class="cnt">${tr.pages.length} ${lang==="zh"?"个页面 / 功能 →":"pages / features →"}</div>
  </div>`;
}

function devTable(tr){
  const rows = tr.pages.map(p=>{
    const isFile = /\.html$/.test(p.pg);
    const pgCell = isFile
      ? `<a href="${protoBase}${p.pg}" target="_blank" rel="noopener">${p.pg}</a>`
      : p.pg;
    const reuse = p.reuse ? `<div class="reuse">↻ ${tt(p.reuse)}</div>` : "";
    return `<tr>
      <td class="pg">${pgCell}</td>
      <td>${tt(p.w)}${reuse}</td>
      <td><span class="pri ${p.pri}">${priLabel(p.pri)}</span></td>
    </tr>`;
  }).join("");
  return `<div class="devhead" style="--c:${tr.color}">
      <span class="em">${tr.em}</span><b>${tr.name}</b>
      <span class="role">${tt(tr.title)} · ${tt(tr.role)}</span></div>
    <p style="font-size:13.5px;color:var(--muted);margin-bottom:8px">${tt(tr.serve)}</p>
    <table style="--c:${tr.color}">
      <thead><tr><th>${tt(T.colHead.page)}</th><th>${tt(T.colHead.work)}</th><th>${tt(T.colHead.pri)}</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
}

function overview(){
  const pr = T.principles.map(p=>
    `<div class="pcard"><h3>${tt(p.h)}</h3><p>${tt(p.p)}</p></div>`).join("");
  const built = T.built.map(b=>`<li>${tt(b)}</li>`).join("");
  const cards = TRACKS.map(trackCard).join("");
  const ms = T.milestones.map(m=>
    `<div class="ms"><h4><span class="wk">${m.wk}</span><span class="dt">${m.dt}</span> · ${tt(m.th)}</h4>
      <p>${tt(m.ex)}</p></div>`).join("");
  return `<div class="lead">${tt(T.lead)}</div>
    <h2 class="sec">${tt(T.principlesTitle)}</h2>
    <div class="grid g3">${pr}</div>
    <h2 class="sec">${tt(T.builtTitle)}</h2>
    <div class="built"><h3>${tt(T.builtNote)}</h3><ul>${built}</ul></div>
    <h2 class="sec">${tt(T.tracksTitle)}</h2>
    <div class="grid g3">${cards}</div>
    <h2 class="sec">${tt(T.msTitle)}</h2>
    ${ms}
    <p class="updated">${lang==="zh"?"最后更新 2026-06-10 · 按页面分工，设计实现由开发自定":"Updated 2026-06-10 · split by page; design & implementation are the developer's call"}</p>`;
}

function render(){
  renderTabs();
  $("#pgTitle").childNodes[0].nodeValue = lang==="zh" ? "任务分工 v2 · 按页面" : "Task Plan v2 · by page";
  if(view==="overview"){ $("#content").innerHTML = overview(); }
  else if(view==="status"){ $("#content").innerHTML = statusView(); }
  else {
    const tr = TRACKS.find(t=>t.id===view);
    $("#content").innerHTML = devTable(tr);
  }
  // wire track cards → jump to dev tab
  $("#content").querySelectorAll("[data-go]").forEach(el=>
    el.onclick=()=>{ view=el.dataset.go; render(); window.scrollTo({top:0,behavior:"smooth"}); });
}

$("#btnZh").onclick=()=>{lang="zh";$("#btnZh").classList.add("on");$("#btnEn").classList.remove("on");render();};
$("#btnEn").onclick=()=>{lang="en";$("#btnEn").classList.add("on");$("#btnZh").classList.remove("on");render();};
render();
</script>
