phase**: membership / payment / invoice built from scratch; **payment gateway = Stripe** (decided 2026-06-08).\n\n---\n\n## 1. Current baseline (already built â€” don't rebuild it)\n\n### Backend `minddoai/backend` (NestJS 11 آ· Prisma 6 آ· Auth0 آ· 15 migrations)\n- âœ… **Full Auth0**: `Auth0Strategy`(JWKS) آ· `RolesGuard` آ· `@Roles` آ· `syncUser` آ· M2M provisioning (`createAuth0User` etc.)\n- âœ… **5-role RBAC** in place\n- âœ… Completed modules: `auth`(`GET /api/auth/me`) آ· `users`(CRUD + children + co-parent invites) آ· `courses` آ· `trial-courses` آ· `trial-registrations`(public) آ· `organizations` آ· `contact-requests`(public submit + status machine) آ· `health` آ· `email`(Mailgun, invite-only)\n- âœ… Global `ValidationPipe` آ· CORS آ· `Dockerfile`(runs `prisma migrate deploy` on start)\n- â‌Œ Missing: global exception filter آ· **audit log** آ· soft delete آ· pagination آ· seed script آ· **backend CI workflow** (only a frontend deploy exists)\n\n### Frontend `minddoai/frontend` (React 19 آ· Vite 8 آ· Tailwind 4 آ· RR7 آ· Auth0)\n- âœ… Landing page (EN/ZH) آ· trial booking `/trial` آ· `/callback` آ· co-parent invite `/accept-invite/:token`\n- âœ… Profile `/profile` (with Family tab: manage children, invite co-parent)\n- âœ… Full admin CRUD: users `/dashboard` آ· courses `/course` آ· trials `/trialCourse` آ· orgs `/organizations` آ· instructors `/instructors` آ· contact requests `/contact-requests`\n- âœ… API layer (`lib/api.ts` with Bearer + `public-api.ts`) آ· Auth0 provider آ· role-based route guards آ· `AdminLayout` آ· pagination/SlidePanel/shared components\n- â‌Œ Missing: **dashboard metrics page** آ· lead pipeline آ· dedicated student management آ· **membership/billing** آ· **schedule/calendar** آ· homework آ· feedback آ· approvals آ· email outbox آ· **assessment page** آ· **payment flow**\n\n---\n\n## ًں“گ Prototype reference: where it is, how to run it, which page maps to your work\n\n> This plan keeps saying \"implement per the prototype.\" The prototype = this MindDo repo (pure HTML/CSS/vanilla JS, no build, all state in localStorage). **Fields, states, and interactions are already defined there â€” click through the flow once before you build.**\n\n**How to run / view:**\n- **Easiest â€” view online**: the prototype is hosted on GitHub Pages, just click:\n  - Portal (bilingual, includes this plan): \u003chttps://li2918.github.io/MindDo/docs/dev-plan.html>\n  - Prototype home: \u003chttps://li2918.github.io/MindDo/index.html>\n  - Any page: `https://li2918.github.io/MindDo/\u003cpage-name>.html`\n- **Run locally**: `git clone https://github.com/li2918/MindDo` â†’ `npm run serve` (runs `python -m http.server 8765`) â†’ open \u003chttp://localhost:8765/>; or just double-click any `.html`.\n- **See/seed data**: the `MindDoFlow.injectPanel()` floating panel (bottom-right of every page) seeds demo data and switches the ops persona; all localStorage keys are in [`SCHEMA.md`](SCHEMA.md).\n- **Self-check after edits**: `npm run smoke` parses every page for syntax errors.\n\n**Which page maps to your work** (prefix `https://li2918.github.io/MindDo/`, click to view):\n\n| Owner | Work area | Prototype pages |\n|---|---|---|\n| **David** | Data model / schema | [`DATABASE_DESIGN.md`](DATABASE_DESIGN.md) آ· `docs/schema-explorer.html` (visual table browser) آ· [`SCHEMA.md`](SCHEMA.md) |\n| **David** | Roles / permissions / ops flows | `docs/super-admin-flow.html` آ· `docs/principal-flow.html` آ· `docs/campus-ops-flow.html` |\n| **Austin** | Funnel | `trial.html` آ· `trial-register.html` آ· `assessment.html` آ· `signup.html` آ· `profile-setup.html` |\n| **Austin** | Family portal | `student-account.html` (main hub) آ· `add-child.html` آ· `add-coparent.html` آ· `feedback.html` آ· `semester-report.html` |\n| **Austin** | Enroll / payment / invoice | `course-selection.html` آ· `course-payment.html` آ· `course-confirm.html` آ· `invoice.html` |\n| **Paul** | Operations dashboard | `dashboard.html` (main, ~18,700 lines) آ· `student-management.html` آ· `request-center.html` |\n| **Paul** | Today lists / email | `new-trials.html` آ· `new-students.html` آ· `email-outbox.html` |\n\n> Navigation backbone: `index â†’ (funnel) trialâ†’assessmentâ†’signupâ†’course-*`, `(family) student-account`, `(ops) dashboardâ†’student-management/request-center/...`.\n\n---\n\n## 2. Refactor alignment: legacy tables â†’ 49-table design (incremental, David-led)\n\n| Current (lean) | Target (DATABASE_DESIGN module) | Strategy |\n|---|---|---|\n| `User`(PARENT/STUDENT + parentId) | `families` + `students` + `guardians` (module C) | **Add new tables + migrate data**; User still carries Auth0 login identity, profile splits into students/guardians |\n| `User`(INSTRUCTOR/ADMIN) | `staff` + `roles`/`permissions` (module A) | Add staff profiles; keep the 5 role enum values, add `role_permissions` |\n| `TrialCourse` + `trial-registrations` | `leads` (module D.1) + trial fields | TrialCourse â†’ leads core; keep bookingRef |\n| `ContactRequest` | `leads`(channel=contact) or `lead_contacts` | Fold into the lead pipeline |\n| `Organization` / `OrganizationMembership` | `campuses` (module B) / org | Clarify \"org vs campus\" semantics, then map |\n| `Course` / `CourseInstructor` | `class_offerings` + `class_sessions` (module E) | Expand into schedule templates + session instances |\n| (none) | `memberships`/`payments`/`invoices` (module F) | **Build new** |\n| (none) | `audit_log` (module I) | **Build new**, global interceptor |\n\n> **Iron rule**: migrate one module at a time, keeping the app runnable at each step; no all-at-once teardown. Every new/changed-table Prisma PR is **reviewed and merged by David**.\n\n---\n\n## 3. MVP table scope this phase (~18 of the 49)\n\n**âœ… Build/align now**: `roles` `permissions` `role_permissions` `staff` (A) آ· `campuses` `classrooms` (B) آ· `families` `students` `guardians` (C) آ· `leads` `lead_contacts` `assessments` (D) آ· `class_offerings` `class_sessions` `class_enrollments` (E) | **Integration آ· QA آ· launch** | end-to-end smoke passes; legacy migration finished; real data imported; prod deploy + rollback plan |\n\n**Critical path**: David's W1 A/B/C model + migration blocks everyone â†’ must land within W1; every legacyâ†’new table move can ripple into existing admin endpoints, so David + the relevant owner must coordinate.\n\n---\n\n## 6. Detailed task lists\n\n> **Per-developer boards (checkable + hard deadlines + effort)**: [David](tasks/david.md) آ· [Paul](tasks/paul.md) آ· [Austin](tasks/austin.md). The below is a summary; execute and check off in the personal boards.\n\n### 6.1 David â€” data-model alignment + backend foundation\n**W1 (top priority, blocks everyone)**\n- [ ] `roles`/`permissions`/`role_permissions` (keep 5 role enum values, add permission mapping) + `staff` profile table\n- [ ] `campuses`/`classrooms` (module B), migrate TrialCourse's campus string fields to FKs\n- [ ] `families`/`students`/`guardians` (module C), write the `User`-hierarchy â†’ 3-table **migration script**; User keeps login identity only\n- [ ] Global **audit interceptor** â†’ `audit_log` (module I); soft-delete middleware; pagination helper; global exception filter\n- [ ] **Seed script** (campuses/roles/demo data, ported from prototype seedDemoData)\n- [ ] **Backend CI workflow** (lint + test + build image)\n- [ ] Common columns (created_by/updated_by/deleted_at/org_id) + `updated_at` trigger\n- [ ] Produce a \"migrate + align\" sample PR for Austin/Paul to copy\n\n**W2â€“W4**\n- [ ] Merge Austin/Paul schema PRs, keep migration order conflict-free\n- [ ] `GET /api/audit` query endpoint (for Paul's audit viewer)\n- [ ] Add key indexes per `DATABASE_DESIGN.md`; performance review\n- [ ] Prod deploy, backups, monitoring, launch checklist + rollback plan\n\n### 6.2 Austin â€” funnel + family portal + academic + finance\n**W1**\n- [ ] schema PR: `leads`/`lead_contacts`/`assessments` (D) (coordinate with David's migration)\n- [ ] Frontend assessment pag   const LS_LANG = "minddo_plan_lang";
  const LS_CHK = "minddo_plan_checks";
  let lang = localStorage.getItem(LS_LANG) === "en" ? "en" : "zh";
  let active = DOCS[0].id;
  let checks = {};
  try { checks = JSON.parse(localStorage.getItem(LS_CHK) || "{}"); } catch(_) {}

  const tabsEl = document.getElementById("tabs");
  const docEl = document.getElementById("doc");
  const elDoc = (id) => DOCS.find(d => d.id === id);

  function mdToHtml(md){
    if (window.marked) return marked.parse(md, { gfm:true, breaks:false });
    return "<pre>"+md.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))+"</pre>";
  }

  function renderTabs(){
    tabsEl.innerHTML = "";
    DOCS.forEach(d => {
      const b = document.createElement("button");
      b.className = "tab" + (d.id===active ? " on" : "");
      const label = lang==="en" ? d.label_en : d.label_zh;
      const pct = pctFor(d.id);
      b.innerHTML = label + (pct!=null ? ' <span class="pct">'+pct+'</span>' : '');
      b.onclick = () => { active = d.id; render(); };
      tabsEl.appendChild(b);
    });
  }

  // count tasks done/total for a doc (language-agnostic; index-aligned)
  function taskCount(id){
    const md = elDoc(id)[lang];
    const items = (md.match(/^\s*- \[[ x]\]/gmi) || []).length;
    let done = 0;
    for (let i=0;i<items;i++) if (checks[id+":"+i]) done++;
    return { done, total: items };
  }
  function pctFor(id){
    const {done,total} = taskCount(id);
    if (!total) return null;
    return done+"/"+total;
  }

  function render(){
    document.documentElement.lang = lang==="en" ? "en" : "zh-CN";
    document.getElementById("btnZh").classList.toggle("on", lang==="zh");
    document.getElementById("btnEn").classList.toggle("on", lang==="en");
    document.getElementById("pageTitle").childNodes[0].nodeValue =
      lang==="en" ? "Dev Plan & Tasks" : "ه¼€هڈ‘è®،هˆ’ن¸ژن»»هٹ،";
    document.getElementById("hint").textContent =
      lang==="en" ? "Tip: checkboxes persist in your browser; the repo markdown is the source of truth."
                  : "وڈگç¤؛ï¼ڑه‹¾é€‰ن»»هٹ،ن¼ڑن؟‌ه­کهœ¨وœ¬وœ؛وµڈè§ˆه™¨ï¼›ن»“ه؛“ markdown ن»چوک¯çœںçگ†و‌¥و؛گم€‚";
    renderTabs();
    docEl.innerHTML = mdToHtml(elDoc(active)[lang]);
    wireCheckboxes();
  }

  // make rendered task-list checkboxes interactive + persisted
  function wireCheckboxes(){
    const boxes = docEl.querySelectorAll('li input[type="checkbox"]');
    boxes.forEach((box, i) => {
      const key = active + ":" + i;
      const li = box.closest("li");
      // wrap the text after the checkbox so we can strike it through
      if (li && !li.querySelector("span.txt")){
        const span = document.createElement("span");
        span.className = "txt";
        while (box.nextSibling) span.appendChild(box.nextSibling);
        box.after(span);
      }
      box.disabled = false;
      box.checked = !!checks[key];
      if (li) li.classList.toggle("done", box.checked);
      box.addEventListener("change", () => {
        checks[key] = box.checked;
        localStorage.setItem(LS_CHK, JSON.stringify(checks));
        if (li) li.classList.toggle("done", box.checked);
        renderTabs(); // refresh the x/y counters
      });
    });
  }

  document.getElementById("btnZh").onclick = () => { lang="zh"; localStorage.setItem(LS_LANG,"zh"); render(); };
  document.getElementById("btnEn").onclick = () => { lang="en"; localStorage.setItem(LS_LANG,"en"); render(); };

  render();
  </script>
