<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="invoice.html" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <title>付费发票 | MindDo Invoice</title>
  <style>
    :root {
      --bg:#fbeed1; --paper:#ffffff; --line:rgba(122,48,16,0.18);
      --line-soft:rgba(122,48,16,0.08);
      --text:#1c1208; --muted:#8a6240; --clay:#7c2d12; --brown:#3a1808;
      --gold:#d89c36; --gold-soft:#f3d99a; --sky:#f59e0b; --sky-deep:#d97706;
      --sand:#f8f3e6;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Avenir Next","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text); background:var(--bg); padding:24px 16px 60px; }
    [data-lang] { display:none; }
    html[lang="zh-CN"] [data-lang="zh"], html[lang="en"] [data-lang="en"] { display:inline; }

    /* Toolbar — print-only chrome, hidden on print */
    .toolbar { max-width:820px; margin:0 auto 16px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .btn { background:#fff; color:var(--clay); border:1px solid var(--line); border-radius:999px;
      padding:9px 18px; font:inherit; font-size:13px; font-weight:700; cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:6px; transition:0.15s; }
    .btn:hover { transform:translateY(-1px); border-color:var(--sky); }
    .btn.primary { background:linear-gradient(135deg,#fde68a,var(--sky)); color:#3a1808;
      border-color:rgba(245,158,11,0.4); box-shadow:0 4px 12px rgba(245,158,11,0.22); }
    .btn.primary:hover { box-shadow:0 8px 20px rgba(245,158,11,0.3); }
    .lang-toggle { background:#fff; border:1px solid var(--line); border-radius:999px; padding:3px;
      display:inline-flex; gap:2px; }
    .lang-toggle button { all:unset; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700;
      color:var(--muted); cursor:pointer; font-family:inherit; }
    .lang-toggle button.active { background:var(--clay); color:#fff; }

    /* Invoice paper — A4 proportions, gold accent bar, watermark logo */
    .invoice {
      max-width:820px; margin:0 auto; background:var(--paper);
      border:1px solid var(--line);
      border-radius:6px;
      box-shadow:0 22px 48px rgba(42,20,8,0.10);
      padding:0;
      position:relative;
      overflow:hidden;
    }
    /* Top gold accent bar — subtle "official document" cue */
    .invoice::before {
      content:""; position:absolute; top:0; left:0; right:0; height:6px;
      background:linear-gradient(90deg,var(--gold) 0%,var(--gold-soft) 50%,var(--gold) 100%);
    }
    /* Watermark logo behind the body */
    .inv-watermark {
      position:absolute; right:-40px; bottom:-40px; width:340px; height:340px;
      opacity:0.04; pointer-events:none; user-select:none;
      background:url("assets/logo.png") center/contain no-repeat;
    }
    .inv-body { position:relative; padding:48px 56px 36px; }

    /* Masthead */
    .inv-head { display:flex; justify-content:space-between; align-items:flex-start; gap:24px;
      flex-wrap:wrap; padding-bottom:24px; border-bottom:2px solid var(--clay); margin-bottom:24px; }
    .inv-brand { display:flex; gap:14px; align-items:flex-start; }
    .inv-brand img { width:54px; height:54px; object-fit:contain; flex:none; }
    .inv-brand-name { font-size:24px; font-weight:900; color:var(--clay); letter-spacing:-0.02em; line-height:1.1; }
    .inv-brand-tag { font-size:11.5px; color:var(--muted); margin-top:4px; line-height:1.55; }
    .inv-brand-co { font-size:11px; color:var(--muted); margin-top:6px; line-height:1.6; max-width:280px; }
    .inv-brand-co .row { display:flex; gap:6px; }
    .inv-brand-co .lbl { color:var(--clay); font-weight:700; min-width:34px; }

    .inv-meta { text-align:right; min-width:200px; }
    .inv-meta .doc-title { font-size:24px; font-weight:900; color:var(--clay);
      letter-spacing:0.04em; text-transform:uppercase; line-height:1.05; margin-bottom:10px; }
    .inv-meta .doc-sub { font-size:10.5px; font-weight:700; letter-spacing:0.16em;
      text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
    .inv-meta .meta-row { font-size:12px; color:var(--muted); margin-top:5px; line-height:1.5;
      display:flex; justify-content:flex-end; gap:6px; }
    .inv-meta .meta-row .lbl { color:var(--muted); font-weight:700;
      letter-spacing:0.06em; text-transform:uppercase; font-size:10px; align-self:center; }
    .inv-meta .meta-row .val { color:var(--clay); font-weight:800; font-size:13px;
      font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace; }
    .inv-meta .meta-row.id .val { font-size:14px; }

    /* Bill-to / payment grid */
    .inv-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px; }
    .inv-block { background:rgba(248,243,230,0.5);
      border:1px solid var(--line-soft); border-radius:8px; padding:14px 16px; }
    .inv-block .k { font-size:10px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase;
      color:var(--gold); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--line-soft); }
    .inv-block .v { font-size:13px; color:var(--clay); line-height:1.7; }
    .inv-block .v strong { font-weight:800; color:var(--brown); }
    .inv-block .v .pill { font-size:11px; color:var(--muted); }

    /* Itemized table */
    table.inv-items { width:100%; border-collapse:collapse; margin-bottom:24px; }
    .inv-items th, .inv-items td { padding:12px 14px; text-align:left; font-size:13px; vertical-align:top; }
    .inv-items th { background:var(--clay); color:#fffbeb; font-weight:800;
      font-size:11px; letter-spacing:0.08em; text-transform:uppercase; }
    .inv-items th:first-child { border-radius:6px 0 0 6px; }
    .inv-items th:last-child { border-radius:0 6px 6px 0; }
    .inv-items td { border-bottom:1px solid var(--line-soft); }
    .inv-items tr:last-child td { border-bottom:none; }
    .inv-items td:nth-child(2),
    .inv-items th:nth-child(2),
    .inv-items td:nth-child(3),
    .inv-items th:nth-child(3),
    .inv-items td:last-child,
    .inv-items th:last-child { text-align:right; white-space:nowrap; }
    .inv-items .item-name { font-weight:800; color:var(--clay); }
    .inv-items .item-detail { font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.55; }

    /* Totals — right-aligned ladder */
    .inv-totals-wrap { display:flex; justify-content:flex-end; margin-bottom:32px; }
    .inv-totals { display:grid; grid-template-columns:auto auto; gap:8px 36px;
      min-width:300px; font-size:13px; }
    .inv-totals .label { color:var(--muted); text-align:right; }
    .inv-totals .value { color:var(--clay); font-weight:700; text-align:right;
      font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace; }
    .inv-totals .grand-row {
      grid-column:1 / -1; display:grid; grid-template-columns:auto auto; gap:36px;
      padding-top:12px; margin-top:6px; border-top:2px solid var(--clay);
    }
    .inv-totals .grand-row .label { color:var(--clay); font-weight:900;
      font-size:14px; letter-spacing:0.04em; text-transform:uppercase; align-self:center; }
    .inv-totals .grand-row .value { color:var(--clay); font-weight:900; font-size:24px;
      font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace; }

    /* Status stamp — diagonal, parchment-like */
    .stamp { position:absolute; top:160px; right:60px; transform:rotate(-14deg);
      font-size:38px; font-weight:900; letter-spacing:0.06em;
      color:rgba(110,143,87,0.32);
      border:5px solid rgba(110,143,87,0.32);
      padding:10px 22px; border-radius:10px;
      pointer-events:none; user-select:none;
      font-family:"Helvetica Neue","PingFang SC",sans-serif;
    }
    .stamp.pending { color:rgba(216,156,54,0.4); border-color:rgba(216,156,54,0.4); }

    /* Footer block — terms + signature line */
    .inv-foot { padding-top:18px; border-top:1px solid var(--line-soft); }
    .inv-foot .terms { font-size:11px; color:var(--muted); line-height:1.7; margin-bottom:18px; }
    .inv-foot .terms strong { color:var(--clay); }
    .inv-foot .terms ul { margin:6px 0 0 16px; padding:0; }
    .inv-foot .terms li { margin-bottom:2px; }
    .inv-sig {
      display:grid; grid-template-columns:1fr 1fr; gap:36px; margin-top:18px;
      padding-top:14px;
    }
    .inv-sig .col { font-size:10.5px; color:var(--muted); }
    .inv-sig .col .line { display:block; height:38px; border-bottom:1px solid var(--clay);
      margin-bottom:6px; position:relative; }
    .inv-sig .col .line::before {
      content:""; position:absolute; bottom:6px; left:0; right:0; height:auto;
    }
    .inv-sig .col.signed .line {
      background:url("assets/logo.png") left bottom/auto 32px no-repeat;
      background-position:8px 4px;
    }
    .inv-sig .col .role { font-weight:800; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--clay); }

    .inv-tagline {
      text-align:center; margin-top:22px; padding-top:14px;
      border-top:1px dashed var(--line-soft);
      font-size:10.5px; color:var(--muted); letter-spacing:0.04em; line-height:1.7;
    }
    .inv-tagline strong { color:var(--clay); font-weight:800; }

    /* Error fallback */
    .err { max-width:760px; margin:0 auto; padding:32px; background:#fff;
      border:1px dashed var(--line); border-radius:16px; text-align:center; color:var(--muted); }
    .err strong { display:block; color:var(--clay); font-size:16px; margin-bottom:6px; }

    @media print {
      body { background:#fff; padding:0; }
      .toolbar { display:none; }
      .invoice { box-shadow:none; border:none; border-radius:0; max-width:none; }
      .invoice::before { height:8px; }
      .inv-body { padding:32px 40px; }
      @page { margin: 14mm; size: A4; }
    }
    @media (max-width: 720px) {
      .inv-body { padding:32px 24px 24px; }
      .inv-head { gap:14px; }
      .inv-meta { text-align:left; }
      .inv-meta .meta-row { justify-content:flex-start; }
      .inv-grid { grid-template-columns:1fr; }
      .stamp { right:24px; top:120px; font-size:28px; padding:8px 16px; }
      .inv-sig { grid-template-columns:1fr; gap:18px; }
      .inv-totals { min-width:0; width:100%; }
    }
  </style>
  <link rel="stylesheet" href="assets/minddo-responsive.css" />
</head>

          ],
          companyTaxLine: "Tax ID · 88-1234567 · CA Reg. C0234567",
          stampPaid: "PAID",
          stampPending: "PROCESSING",
          invNumLabel: "Invoice #",
          dateLabel: "Issue Date",
          dueLabel: "Paid On",
          billToLabel: "BILL TO",

          paymentMethodMap: { alipay: "Alipay", wechat: "WeChat Pay", card: "Credit Card (Visa/Master)", email: "Email Pay" },
          colDesc: "Description",
          colQty: "Qty",
          colUnit: "Unit Price",
          colTotal: "Amount",
          itemPlanFmt: "{plan} · MindDo Membership",
          itemPlanGeneric: "MindDo Membership",
          itemDetailMonthly: "{sessions} class/week · 1-month billing cycle",
          itemDetailAnnual: "{sessions} class/week · 12-month cycle (Annual saves 17%)",
          itemDetailGeneric: "MindDo Learning Membership",
          unitMonth: "1 month",
          unitYear: "1 year",
          cycleMonthly: "Monthly",
          cycleAnnual: "Annual (save 17%)",
          subtotal: "Subtotal",
          discount: "Discount",
          tax: "Tax",
          grand: "Total Due",
          currencyNote: "Amounts in USD",
          termsTitle: "Terms",
          termsBullets: [
            "Full refund available within 7 days of purchase, no questions asked.",
            "Completed classes are deducted pro-rata from any refund issued.",
            "This invoice is system-generated by MindDo and is valid without a manual signature."
          ],
          sigStudent: "Customer",
          sigCompany: "MindDo Authorized Rep",
          tagline: "Thank you for choosing MindDo — making AI a partner for the next generation.",
          taglineSub: "This invoice can be re-downloaded anytime from the Billing tab in your parent account.",
          notFound: "Invoice not found.",
          notFoundDesc: "The link may have expired, or the matching payment record hasn't been generated yet. Please reopen it from the Billing page.",
          backToBilling: "Back to Billing",
          documentTitle: "MindDo · Invoice"
        }
      };

      var html = document.documentElement;
      var lang = (function () {
        try {
          var saved = localStorage.getItem("minddo_lang");
          return saved === "en" ? "en" : "zh-CN";
        } catch (_) { return "zh-CN"; }
      })();
      function t() { return I18N[lang]; }

      function escHTML(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function moneyFmt(amount) {
        var n = Number(amount);
        if (!isFinite(n)) return "—";
        // Comma-separated, two decimals — same shape on either lang.
        return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function fmtDate(iso, opts) {
        if (!iso) return "—";
        try {
          var d = new Date(iso);
          var o = opts || { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" };
          return d.toLocaleString(lang === "en" ? "en-US" : "zh-CN", o);
        } catch (_) { return iso; }
      }
      function fmtDateOnly(iso) {
        return fmtDate(iso, { year: "numeric", month: "short", day: "numeric" });
      }
      function methodLabel(code) {
        var dict = (t().paymentMethodMap || {});
        return dict[String(code || "").toLowerCase()] || code || "—";
      }
      function readJson(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key) || "null") || fallback; }
        catch (_) { return fallback; }
      }

      var params = new URLSearchParams(window.location.search);
      var orderId = (params.get("orderId") || "").trim();

      function renderError() {
        document.getElementById("invoiceBody").innerHTML =
          "<div class=\"err\"><strong>" + escHTML(t().notFound) + "</strong>"
          + "<p style=\"font-size:13px;line-height:1.6;\">" + escHTML(t().notFoundDesc) + "</p>"
          + "<p style=\"margin-top:14px;\"><a class=\"btn primary\" href=\"student-account.html\">"
          + escHTML(t().backToBilling) + "</a></p>"
          + "</div>";
      }

      function loadOrder() {
        var payments = readJson("minddo_payments", []) || [];
        var memberships = readJson("minddo_membership_orders", []) || [];
        var pay = payments.filter(function (p) {
          return String(p && p.orderId || p && p.id || "") === orderId;
        })[0] || null;
        var mem = memberships.filter(function (m) {
          return String(m && m.orderId || "") === orderId;
        })[0] || null;
        if (!pay && !mem) return null;
        return { payment: pay || {}, membership: mem || {} };
      }

      function findIdentity(emailOrSid) {
        var flow = window.MindDoFlow;
        if (!flow) return {};
        var sid = (typeof emailOrSid === "object" && emailOrSid) ? (emailOrSid.studentId || "") : "";
        var email = (typeof emailOrSid === "object" && emailOrSid) ? (emailOrSid.email || "") : "";
        var student = (sid && flow.findStudentById) ? flow.findStudentById(sid) : null;
        var account = email ? (flow.findAccountByEmail && flow.findAccountByEmail(email)) : null;
        if (!account && flow.getCurrentAccount) account = flow.getCurrentAccount();
        var guardian = (account && account.linkedEntityId && flow.findGuardianById)
          ? flow.findGuardianById(account.linkedEntityId) : null;
        return {
          student: student || {},
          account: account || {},
          guardian: guardian || {}
        };
      }

      function planSessions(planId) {
        // Pull the per-week sessions from the central catalog so item
        // detail strings like "2 class/week · 1-month cycle" stay
        // accurate when the pricing catalog moves.
        var flow = window.MindDoFlow;
        if (!flow || !flow.findMembershipPlan) return 0;
        var p = flow.findMembershipPlan(planId);
        return (p && p.sessionsPerWeek) || 0;
      }

      function renderInvoice(record) {
        var pay = record.payment || {};
        var mem = record.membership || {};
        var amount = (typeof pay.amount === "number" && pay.amount) || mem.totalAmount || 0;
        var planText = mem.planLabel || (mem.plan ? mem.plan : "");
        var cycle = mem.billingCycle === "annual" ? "annual" : "monthly";
        var sessionsPerWeek = planSessions(mem.plan);

        var itemDesc = planText
          ? (t().itemPlanFmt || "{plan}").replace("{plan}", planText)
          : t().itemPlanGeneric;
        var itemDetail;
        if (!sessionsPerWeek) {
          itemDetail = t().itemDetailGeneric;
        } else if (cycle === "annual") {
          itemDetail = t().itemDetailAnnual.replace("{sessions}", sessionsPerWeek);
        } else {
          itemDetail = t().itemDetailMonthly.replace("{sessions}", sessionsPerWeek);
        }
        var unitLabel = cycle === "annual" ? t().unitYear : t().unitMonth;
        var cycleLabel = cycle === "annual" ? t().cycleAnnual : t().cycleMonthly;

        var ident = findIdentity({ email: pay.email || mem.email, studentId: mem.studentId || pay.studentId });
        var paid = (pay.status !== "pending");
        var paidDate = pay.paidAt || pay.createdAt || mem.createdAt;
        var stampClass = paid ? "" : " pending";
        var stampText = paid ? t().stampPaid : t().stampPending;

        document.title = t().documentTitle + " · " + (orderId || "");

        var co = t();
        var addrHtml = co.companyAddr.map(function (line) {
          return escHTML(line);
        }).join("<br />");
        var contactHtml = co.companyContact.map(function (row) {
          return "<div class=\"row\"><span class=\"lbl\">" + escHTML(row.lbl) + "</span><span>" + escHTML(row.val) + "</span></div>";
        }).join("");

        var termsHtml = (co.termsBullets || []).map(function (b) {
          return "<li>" + escHTML(b) + "</li>";
        }).join("");

        document.getElementById("invoiceBody").innerHTML = ""
          + "<article class=\"invoice\">"
          +   "<div class=\"inv-watermark\" aria-hidden=\"true\"></div>"
          +   "<div class=\"inv-body\">"
          +     "<div class=\"stamp" + stampClass + "\">" + escHTML(stampText) + "</div>"

          +     "<div class=\"inv-head\">"
          +       "<div class=\"inv-brand\">"
          +         "<img src=\"assets/logo.png\" alt=\"MindDo\" />"
          +         "<div>"
          +           "<div class=\"inv-brand-name\">MindDo</div>"
          +           "<div class=\"inv-brand-tag\">" + escHTML(co.tag) + "</div>"
          +           "<div class=\"inv-brand-co\">"
          +             "<div style=\"margin-bottom:4px;\">" + addrHtml + "</div>"
          +             contactHtml
          +             "<div style=\"margin-top:6px;font-size:10.5px;color:var(--muted);\">" + escHTML(co.companyTaxLine) + "</div>"
          +           "</div>"
          +         "</div>"
          +       "</div>"
          +       "<div class=\"inv-meta\">"
          +         "<div class=\"doc-sub\">" + escHTML(co.docSub) + "</div>"
          +         "<div class=\"doc-title\">" + escHTML(co.docTitle) + "</div>"
          +         "<div class=\"meta-row id\"><span class=\"lbl\">" + escHTML(co.invNumLabel) + "</span><span class=\"val\">" + escHTML(orderId || "—") + "</span></div>"
          +         "<div class=\"meta-row\"><span class=\"lbl\">" + escHTML(co.dateLabel) + "</span><span class=\"val\">" + escHTML(fmtDateOnly(paidDate)) + "</span></div>"
          +       "</div>"
          +     "</div>"

          +     "<div class=\"inv-grid\">"
          +       "<div class=\"inv-block\">"
          +         "<div class=\"k\">" + escHTML(co.billToLabel) + "</div>"
          +         "<div class=\"v\">"
          +           "<strong>" + escHTML(ident.student.name || mem.studentName || "—") + "</strong> "
          +           "<span class=\"pill\">(" + escHTML(co.billToName) + ")</span><br />"
          +           (ident.guardian.name ? (escHTML(ident.guardian.name) + " <span class=\"pill\">(" + escHTML(co.billToParent) + ")</span><br />") : "")
          +           "<span class=\"pill\">" + escHTML(co.billToEmail) + ":</span> " + escHTML(pay.email || ident.account.email || mem.email || "—") + "<br />"
          +           "<span class=\"pill\">" + escHTML(co.billToStudentId) + ":</span> " + escHTML(mem.studentId || ident.student.studentId || "—")
          +           (ident.account.familyId ? ("<br /><span class=\"pill\">" + escHTML(co.billToFamily) + ":</span> " + escHTML(ident.account.familyId)) : "")
          +         "</div>"
          +       "</div>"
          +       "<div class=\"inv-block\">"
          +         "<div class=\"k\">" + escHTML(co.paymentLabel) + "</div>"
          +         "<div class=\"v\">"
          +           "<span class=\"pill\">" + escHTML(co.paymentMethodLabel) + ":</span> <strong>" + escHTML(methodLabel(pay.method || pay.source)) + "</strong><br />"
          +           "<span class=\"pill\">" + escHTML(co.paymentDateLabel) + ":</span> " + escHTML(fmtDate(paidDate)) + "<br />"
          +           "<span class=\"pill\">" + escHTML(co.paymentCycleLabel) + ":</span> <strong>" + escHTML(cycleLabel) + "</strong><br />"
          +           "<span class=\"pill\">" + escHTML(co.paymentOrderLabel) + ":</span> <strong>" + escHTML(orderId || "—") + "</strong>"
          +         "</div>"
          +       "</div>"
          +     "</div>"

          +     "<table class=\"inv-items\">"
          +       "<thead><tr>"
          +         "<th>" + escHTML(co.colDesc) + "</th>"
          +         "<th>" + escHTML(co.colQty) + "</th>"
          +         "<th>" + escHTML(co.colUnit) + "</th>"
          +         "<th>" + escHTML(co.colTotal) + "</th>"
          +       "</tr></thead>"
          +       "<tbody><tr>"
          +         "<td>"
          +           "<div class=\"item-name\">" + escHTML(itemDesc) + "</div>"
          +           "<div class=\"item-detail\">" + escHTML(itemDetail) + "</div>"
          +         "</td>"
          +         "<td>" + escHTML(unitLabel) + "</td>"
          +         "<td>" + escHTML(moneyFmt(amount)) + "</td>"
          +         "<td>" + escHTML(moneyFmt(amount)) + "</td>"
          +       "</tr></tbody>"
          +     "</table>"

          +     "<div class=\"inv-totals-wrap\">"
          +       "<div class=\"inv-totals\">"
          +         "<span class=\"label\">" + escHTML(co.subtotal) + "</span>"
          +         "<span class=\"value\">" + escHTML(moneyFmt(amount)) + "</span>"
          +         "<span class=\"label\">" + escHTML(co.discount) + "</span>"
          +         "<span class=\"value\">" + escHTML(moneyFmt(0)) + "</span>"
          +         "<span class=\"label\">" + escHTML(co.tax) + "</span>"
          +         "<span class=\"value\">" + escHTML(moneyFmt(0)) + "</span>"
          +         "<div class=\"grand-row\">"
          +           "<span class=\"label\">" + escHTML(co.grand) + "</span>"
          +           "<span class=\"value\">" + escHTML(moneyFmt(amount)) + "</span>"
          +         "</div>"
          +       "</div>"
          +     "</div>"

          +     "<div class=\"inv-foot\">"
          +       "<div class=\"terms\">"
          +         "<strong>" + escHTML(co.termsTitle) + " · " + escHTML(co.currencyNote) + "</strong>"
          +         "<ul>" + termsHtml + "</ul>"
          +       "</div>"
          +       "<div class=\"inv-sig\">"
          +         "<div class=\"col\">"
          +           "<span class=\"line\"></span>"
          +           "<span class=\"role\">" + escHTML(co.sigStudent) + "</span>"
          +         "</div>"
          +         "<div class=\"col signed\">"
          +           "<span class=\"line\"></span>"
          +           "<span class=\"role\">" + escHTML(co.sigCompany) + "</span>"
          +         "</div>"
          +       "</div>"
          +       "<div class=\"inv-tagline\">"
          +         "<strong>" + escHTML(co.tagline) + "</strong><br />"
          +         escHTML(co.taglineSub)
          +       "</div>"
          +     "</div>"

          +   "</div>" // .inv-body
          + "</article>";
      }

      function applyLang() {
        html.setAttribute("lang", lang);
        try { localStorage.setItem("minddo_lang", lang); } catch (_) {}
        document.querySelectorAll("[data-set-lang]").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-set-lang") === lang);
        });
        var record = orderId ? loadOrder() : null;
        if (!record) renderError();
        else renderInvoice(record);
      }

      document.getElementById("langToggle").addEventListener("click", function (e) {
        var b = e.target.closest("[data-set-lang]");
        if (!b) return;
        lang = b.getAttribute("data-set-lang") === "en" ? "en" : "zh-CN";
        applyLang();
      });
      document.getElementById("printBtn").addEventListener("click", function () {
        window.print();
      });
      document.getElementById("closeBtn").addEventListener("click", function () {
        if (window.history.length > 1) window.history.back();
        else window.close();
      });

      applyLang();
    })();
  </script>
</body>
</html>
