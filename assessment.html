<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment | 学习评估</title>
  <style>
    :root {
      --bg: #f6efe4;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --primary: #f0a11f;
      --primary-soft: #ffd978;
      --primary-deep: #8c3d14;
      --text: #4f2410;
      --muted: #8b6e58;
      --success: #6f8f57;
      --error: #c46a4d;
      --shadow: 0 24px 56px rgba(123, 72, 24, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.3), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(244, 162, 38, 0.14), transparent 24%),
        linear-gradient(180deg, #fffdf9, #f6efe4);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 208, 118, 0.16), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(179, 76, 14, 0.08), transparent 28%);
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 52px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 252, 247, 0.82);
      box-shadow: 0 18px 48px rgba(123, 72, 24, 0.08);
      backdrop-filter: blur(12px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }
    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .brand-copy { display: grid; gap: 4px; }
    .brand-copy strong { font-size: 19px; color: var(--primary-deep); }
    .brand-copy span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aa6a2b;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chip, .lang-btn, .submit-btn, .ghost-btn {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .chip:hover, .lang-btn:hover, .lang-btn.active, .submit-btn:hover, .ghost-btn:hover {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      border-color: rgba(208, 129, 36, 0.5);
      box-shadow: 0 10px 24px rgba(192, 123, 39, 0.18);
      color: var(--primary-deep);
    }
    .submit-btn { background: linear-gradient(135deg, #fff4cf, var(--primary)); font-weight: 700; }
    .lang-switch { display: flex; gap: 10px; }
    .hero, .card {
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(252, 244, 232, 0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .hero-copy h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 38px);
      color: var(--primary-deep);
      line-height: 1.08;
    }
    .hero-copy p, .section-head p, .mini-card span, .summary-card span, .quiz-card p, .choice span, .helper, .rubric-item span, .recommendation span {
      color: var(--muted);
      line-height: 1.65;
    }
    .hero-points, .main-stack, .side-stack, form, .quiz-list, .summary-grid, .rubric { display: grid; gap: 16px; }
    .hero-point, .mini-card, .summary-card, .quiz-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid rgba(151, 84, 21, 0.1);
      background: rgba(255, 251, 245, 0.9);
    }
    .hero-point strong, .mini-card strong, .summary-card strong, .recommendation strong {
      display: block;
      margin-bottom: 6px;
      color: var(--primary-deep);
      font-size: 14px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .section-head h2, .quiz-card h3 { margin: 0; color: var(--primary-deep); }
    .section-head h2 { font-size: 21px; }
    .intro-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label, .field-title {
      display: block;
      font-size: 13px;
      color: #7b5b43;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(151, 84, 21, 0.16);
      background: rgba(255, 252, 247, 0.88);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    textarea { min-height: 104px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(208, 129, 36, 0.54);
      box-shadow: 0 0 0 4px rgba(255, 204, 97, 0.2);
    }
    .choice-group { display: grid; gap: 10px; }
    .choice {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      border: 1px solid rgba(151, 84, 21, 0.12);
      border-radius: 16px;
      background: rgba(255, 251, 245, 0.88);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(208, 129, 36, 0.34);
      box-shadow: 0 12px 24px rgba(123, 72, 24, 0.08);
    }
    .choice input { width: 16px; margin-top: 3px; flex: 0 0 auto; }
    .choice strong { display: block; margin-bottom: 4px; font-size: 14px; color: var(--text); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .result {
      font-size: 13px;
      padding: 12px 14px;
      border-radius: 14px;
      display: none;
      line-height: 1.6;
    }
    .result.success {
      display: block;
      border: 1px solid rgba(111, 143, 87, 0.28);
      background: rgba(111, 143, 87, 0.1);
      color: var(--success);
    }
    .result.error {
      display: block;
      border: 1px solid rgba(196, 106, 77, 0.28);
      background: rgba(196, 106, 77, 0.1);
      color: var(--error);
    }
    .score-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(208, 129, 36, 0.24);
      background: linear-gradient(135deg, #fff5d9, var(--primary-soft));
      color: var(--primary-deep);
      font-weight: 700;
      font-size: 13px;
    }
    .rubric-item {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 10px;
      align-items: start;
    }
    .rubric-item b {
      display: inline-flex;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 236, 189, 0.8);
      color: var(--primary-deep);
      font-size: 12px;
    }
    .recommendation {
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 246, 225, 0.92), rgba(255, 251, 243, 0.92));
      border: 1px solid rgba(208, 129, 36, 0.18);
    }
    @media (max-width: 980px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .intro-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .container { padding: 22px 14px 38px; }
      .topbar { justify-content: center; border-radius: 18px; }
      .toolbar { width: 100%; justify-content: space-between; }
      .row, .intro-grid { grid-template-columns: 1fr; }
      .hero, .card { border-radius: 20px; padding: 18px; }
      .actions { flex-direction: column; align-items: stretch; }
      .submit-btn, .ghost-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="MindDo home">
        <img src="assets/logo.png" alt="Mindo AI logo" />
        <div class="brand-copy">
          <span>Mindo AI</span>
          <strong>Mindo AI</strong>
        </div>
      </a>
      <div class="toolbar">
        <a class="chip" href="index.html" data-i18n="backFlow"></a>
        <a class="chip" href="trial.html" data-i18n="goTrial"></a>
        <a class="chip" href="signup.html" data-i18n="backSignup"></a>
        <a class="chip" href="student-account.html" data-i18n="goAccount"></a>
        <a class="chip" href="course-system.html" data-i18n="goCourseSystem"></a>
        <a class="chip" href="course-selection.html" data-i18n="goCourseSelection"></a>
        <a class="chip" href="feedback.html" data-i18n="goFeedback"></a>
        <a class="chip" href="semester-report.html" data-i18n="goSemesterReport"></a>
        <a class="chip" href="dashboard.html" data-i18n="goDashboard"></a>
        <div class="lang-switch">
          <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
          <button class="lang-btn" type="button" data-set-lang="en">English</button>
        </div>
      </div>
    </div>

    <section class="hero">
      <div class="hero-copy">
        <h1 data-i18n="title"></h1>
        <p id="welcomeText"></p>
      </div>
      <div class="hero-points">
        <div class="hero-point"><strong data-i18n="heroPointOneTitle"></strong><span data-i18n="heroPointOneText"></span></div>
        <div class="hero-point"><strong data-i18n="heroPointTwoTitle"></strong><span data-i18n="heroPointTwoText"></span></div>
        <div class="hero-point"><strong data-i18n="heroPointThreeTitle"></strong><span data-i18n="heroPointThreeText"></span></div>
      </div>
    </section>

    <div class="layout">
      <div class="main-stack">
        <section class="card">
          <div class="section-head">
            <div>
              <h2 data-i18n="overviewTitle"></h2>
              <p data-i18n="overviewIntro"></p>
            </div>
          </div>
          <div class="intro-grid">
            <article class="mini-card"><strong data-i18n="dimensionOneTitle"></strong><span data-i18n="dimensionOneText"></span></article>
            <article class="mini-card"><strong data-i18n="dimensionTwoTitle"></strong><span data-i18n="dimensionTwoText"></span></article>
            <article class="mini-card"><strong data-i18n="dimensionThreeTitle"></strong><span data-i18n="dimensionThreeText"></span></article>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2 data-i18n="formTitle"></h2>
              <p data-i18n="formIntro"></p>
            </div>
          </div>
          <form id="assessmentForm" novalidate>
            <div class="row">
              <div><label for="level" data-i18n="level"></label><select id="level" name="level" required></select></div>
              <div><label for="goal" data-i18n="goal"></label><select id="goal" name="goal" required></select></div>
            </div>
            <div class="row">
              <div>
                <label for="confidence" data-i18n="confidence"></label>
                <select id="confidence" name="confidence" required></select>
                <div class="helper" data-i18n="confidenceHint"></div>
              </div>
              <div><label for="learningStyle" data-i18n="learningStyle"></label><select id="learningStyle" name="learningStyle" required></select></div>
            </div>
            <div>
              <label for="notes" data-i18n="notes"></label>
              <textarea id="notes" name="notes"></textarea>
              <div class="helper" data-i18n="notesHint"></div>
            </div>
            <div class="section-head">
              <div>
                <h2 data-i18n="quizTitle"></h2>
                <p data-i18n="quizIntro"></p>
              </div>
              <div class="score-badge" id="scoreBadge">0 / 3</div>
            </div>
            <div class="quiz-list" id="quizList"></div>
            <div class="actions">
              <button class="submit-btn" type="submit" data-i18n="submit"></button>
              <button class="ghost-btn" type="button" id="fillSampleBtn" data-i18n="fillSample"></button>
            </div>
            <div id="result" class="result" role="status" aria-live="polite"></div>
          </form>
        </section>
      </div>

      <aside class="side-stack">
        <section class="card">
          <div class="section-head">
            <div>
              <h2 data-i18n="summaryTitle"></h2>
              <p data-i18n="summaryIntro"></p>
            </div>
          </div>
          <div class="summary-grid">
            <article class="summary-card"><strong data-i18n="summaryTimeTitle"></strong><span data-i18n="summaryTimeText"></span></article>
            <article class="summary-card"><strong data-i18n="summaryScoringTitle"></strong><span data-i18n="summaryScoringText"></span></article>
            <article class="summary-card"><strong data-i18n="summaryNextTitle"></strong><span data-i18n="summaryNextText"></span></article>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2 data-i18n="rubricTitle"></h2>
              <p data-i18n="rubricIntro"></p>
            </div>
          </div>
          <div class="rubric">
            <div class="rubric-item"><b>01</b><span data-i18n="rubricOne"></span></div>
            <div class="rubric-item"><b>02</b><span data-i18n="rubricTwo"></span></div>
            <div class="rubric-item"><b>03</b><span data-i18n="rubricThree"></span></div>
          </div>
        </section>

        <section class="card">
          <div class="recommendation">
            <strong data-i18n="recommendTitle"></strong>
            <span id="recommendationText"></span>
          </div>
        </section>
      </aside>
    </div>
  </main>

          heroPointThreeTitle: "Output",
          heroPointThreeText: "The system stores level, quiz score, and a recommendation so the next pages can continue the flow.",
          overviewTitle: "What This Page Evaluates",
          overviewIntro: "This is no longer a plain form. It is a lightweight assessment surface with visible judgment logic.",
          dimensionOneTitle: "Foundational Reading",
          dimensionOneText: "Check whether the student can capture conditions, intent, and keywords reliably.",
          dimensionTwoTitle: "Strategy Expression",
          dimensionTwoText: "Observe whether the student can explain reasoning instead of only giving an answer.",
          dimensionThreeTitle: "Course Fit",
          dimensionThreeText: "Combine goal and quiz performance to recommend difficulty and follow-up pace.",
          formTitle: "Assessment Intake",
          formIntro: "Record the student profile first, then complete the sample quiz below.",
          level: "Current Level",
          goal: "Short-Term Goal",
          confidence: "Learning Confidence",
          confidenceHint: "Useful for separating 'doesn't know yet' from 'knows but hesitates to answer'.",
          learningStyle: "Preferred Learning Style",
          notes: "Additional Notes (Optional)",
          notesHint: "Use this for trial observations, parent feedback, focus level, or expression notes.",
          quizTitle: "Sample Questions",
          quizIntro: "Each question is worth 1 point and demonstrates the page structure plus basic scoring logic.",
          submit: "Submit Assessment",
          fillSample: "Auto Fill Sample",
          summaryTitle: "Assessment Summary",
          summaryIntro: "Use this sidebar to explain to parents or consultants what the evaluation is measuring.",
          summaryTimeTitle: "Suggested Time",
          summaryTimeText: "About 5 to 8 minutes, ideal for immediate post-trial input and confirmation.",
          summaryScoringTitle: "Scoring Logic",
          summaryScoringText: "The quiz totals 3 points, then combines with level, confidence, and goal to form a recommendation.",
          summaryNextTitle: "Next Step",
          summaryNextText: "After submission, the flow can continue to signup, course selection, or reporting.",
          rubricTitle: "Observation Rubric",
          rubricIntro: "If expanded later, these dimensions can turn directly into a fuller question bank.",
          rubricOne: "Information extraction: can the student identify the real conditions and avoid distractions?",
          rubricTwo: "Logical reasoning: can the student follow simple rules step by step instead of guessing?",
          rubricThree: "Language output: can the student summarize a conclusion clearly?",
          recommendTitle: "Current Recommendation",
          recommendationLow: "Start with a foundational guided course path and focus on understanding prompts plus steadier response rhythm.",
          recommendationMid: "Move into a standard growth path with structured practice to stabilize accuracy and complete explanations.",
          recommendationHigh: "Offer more challenging project or competition-style content to maintain momentum and output intensity.",
          levels: ["Please select", "Beginner", "Intermediate", "Advanced"],
          goals: ["Please select", "Score Improvement", "Competition", "Interest Learning", "Admission Prep"],
          confidences: ["Please select", "Needs a lot of encouragement", "Usually willing to answer", "Actively answers with stability"],
          learningStyles: ["Please select", "Prefers guided instruction", "Prefers step-by-step breakdown", "Prefers project exploration"],
          invalid: "Please complete the required fields and choose one answer for each sample question.",
          scoreLabel: "Quiz Score: {score}/{total}",
          resultWithAdvice: "Assessment submitted. Score {score}/{total}. Recommendation: {recommendation}",
          questions: [
            {
              title: "Question 1: Information Extraction",
              prompt: "Read: \"Ming attends robotics on Monday and Wednesday, and programming on Friday.\" If only one day can be chosen to review robotics, which choice fits best?",
              options: [
                { label: "A", text: "Monday or Wednesday", value: "correct" },
                { label: "B", text: "Friday only", value: "wrong" },
                { label: "C", text: "No day works", value: "wrong" }
              ]
            },
            {
              title: "Question 2: Logic",
              prompt: "If every student who completes the trial assessment receives a course recommendation, and Xiaoyu has received a recommendation, which statement is most reasonable?",
              options: [
                { label: "A", text: "We can be certain Xiaoyu completed the trial assessment", value: "wrong" },
                { label: "B", text: "At least Xiaoyu has entered the recommendation process", value: "correct" },
                { label: "C", text: "This means Xiaoyu has already enrolled", value: "wrong" }
              ]
            },
            {
              title: "Question 3: Expression",
              prompt: "A parent asks, \"How did my child do in the trial?\" Which response works best as a short written assessment conclusion?",
              options: [
                { label: "A", text: "It was okay.", value: "wrong" },
                { label: "B", text: "The student followed well and understood quickly, but still needs prompts when explaining ideas.", value: "correct" },
                { label: "C", text: "Let's talk later.", value: "wrong" }
              ]
            }
          ]
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var levelSelect = document.getElementById("level");
      var goalSelect = document.getElementById("goal");
      var confidenceSelect = document.getElementById("confidence");
      var learningStyleSelect = document.getElementById("learningStyle");
      var form = document.getElementById("assessmentForm");
      var result = document.getElementById("result");
      var welcomeText = document.getElementById("welcomeText");
      var quizList = document.getElementById("quizList");
      var scoreBadge = document.getElementById("scoreBadge");
      var fillSampleBtn = document.getElementById("fillSampleBtn");
      var recommendationText = document.getElementById("recommendationText");
      var params = new URLSearchParams(window.location.search);
      var currentStudent = window.MindDoFlow && window.MindDoFlow.getCurrentStudent ? window.MindDoFlow.getCurrentStudent() : null;
      var name = params.get("name") || (currentStudent && (currentStudent.studentName || currentStudent.name)) || "";
      var email = params.get("email") || (currentStudent && currentStudent.email) || "";

      function getLang() {
        return html.getAttribute("lang") === "en" ? "en" : "zh-CN";
      }

      function buildOptions(select, options) {
        select.innerHTML = options.map(function (item, idx) {
          return "<option value=\"" + item + "\"" + (idx === 0 ? " selected" : "") + ">" + item + "</option>";
        }).join("");
      }

      function renderQuiz(lang) {
        var t = I18N[lang];
        quizList.innerHTML = t.questions.map(function (question, questionIndex) {
          var choices = question.options.map(function (option, optionIndex) {
            var inputId = "q" + questionIndex + "_" + optionIndex;
            return "<label class=\"choice\" for=\"" + inputId + "\"><input id=\"" + inputId + "\" type=\"radio\" name=\"question_" + questionIndex + "\" value=\"" + option.value + "\" /><span><strong>" + option.label + "</strong><span>" + option.text + "</span></span></label>";
          }).join("");
          return "<article class=\"quiz-card\"><h3>" + question.title + "</h3><p>" + question.prompt + "</p><div class=\"choice-group\">" + choices + "</div></article>";
        }).join("");
        quizList.querySelectorAll("input[type='radio']").forEach(function (input) {
          input.addEventListener("change", updateScorePreview);
        });
      }

      function getSelectedAnswers() {
        var t = I18N[getLang()];
        var answers = [];
        for (var i = 0; i < t.questions.length; i += 1) {
          var checked = form.querySelector("input[name='question_" + i + "']:checked");
          answers.push(checked ? checked.value : "");
        }
        return answers;
      }

      function getQuizScore() {
        return getSelectedAnswers().reduce(function (sum, value) {
          return sum + (value === "correct" ? 1 : 0);
        }, 0);
      }

      function getRecommendation(score, total, lang) {
        var t = I18N[lang];
        if (score <= 1) return t.recommendationLow;
        if (score < total) return t.recommendationMid;
        return t.recommendationHigh;
      }

      function updateScorePreview() {
        var lang = getLang();
        var t = I18N[lang];
        var total = t.questions.length;
        var score = getQuizScore();
        scoreBadge.textContent = t.scoreLabel.replace("{score}", score).replace("{total}", total);
        recommendationText.textContent = getRecommendation(score, total, lang);
      }

      function setLang(lang) {
        var t = I18N[lang] || I18N["zh-CN"];
        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = t.title + " | Assessment";
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) el.textContent = t[key];
        });
        welcomeText.textContent = name || email
          ? t.welcome.replace("{name}", name || "Student").replace("{email}", email || "-")
          : t.welcomeNoUser;
        buildOptions(levelSelect, t.levels);
        buildOptions(goalSelect, t.goals);
        buildOptions(confidenceSelect, t.confidences);
        buildOptions(learningStyleSelect, t.learningStyles);
        renderQuiz(lang);
        updateScorePreview();
        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });
        result.className = "result";
        result.textContent = "";
      }

      var saved = localStorage.getItem("minddo_lang");
      setLang(saved === "en" ? "en" : "zh-CN");

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setLang(btn.getAttribute("data-set-lang"));
        });
      });

      fillSampleBtn.addEventListener("click", function () {
        var lang = getLang();
        var t = I18N[lang];
        levelSelect.value = t.levels[2];
        goalSelect.value = t.goals[1];
        confidenceSelect.value = t.confidences[2];
        learningStyleSelect.value = t.learningStyles[2];
        form.notes.value = lang === "en"
          ? "The student responds quickly, but sometimes needs help turning thoughts into complete explanations."
          : "学生反应较快，但在把想法说完整时还需要一些引导。";
        ["correct", "correct", "correct"].forEach(function (value, index) {
          var input = form.querySelector("input[name='question_" + index + "'][value='" + value + "']");
          if (input) input.checked = true;
        });
        updateScorePreview();
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var lang = getLang();
        var t = I18N[lang];
        var answers = getSelectedAnswers();
        var total = t.questions.length;
        var score = getQuizScore();
        var payload = {
          name: name,
          email: email,
          level: levelSelect.value,
          goal: goalSelect.value,
          confidence: confidenceSelect.value,
          learningStyle: learningStyleSelect.value,
          notes: form.notes.value.trim(),
          quizAnswers: answers,
          quizScore: score,
          quizTotal: total,
          recommendation: getRecommendation(score, total, lang),
          createdAt: new Date().toISOString()
        };

        if (
          payload.level === t.levels[0] ||
          payload.goal === t.goals[0] ||
          payload.confidence === t.confidences[0] ||
          payload.learningStyle === t.learningStyles[0] ||
          answers.some(function (item) { return !item; })
        ) {
          result.className = "result error";
          result.textContent = t.invalid;
          return;
        }

        if (window.MindDoFlow && window.MindDoFlow.saveAssessment) {
          window.MindDoFlow.saveAssessment(payload);
        } else {
          var key = "minddo_assessments";
          var list = JSON.parse(localStorage.getItem(key) || "[]");
          list.push(payload);
          localStorage.setItem(key, JSON.stringify(list));
        }

        var resultText = t.resultWithAdvice
          .replace("{score}", payload.quizScore)
          .replace("{total}", payload.quizTotal)
          .replace("{recommendation}", payload.recommendation);

        form.reset();
        setLang(lang);
        recommendationText.textContent = payload.recommendation;
        scoreBadge.textContent = t.scoreLabel.replace("{score}", payload.quizScore).replace("{total}", payload.quizTotal);
        result.className = "result success";
        result.textContent = resultText;
      });
    })();
  </script>
</body>
</html>
