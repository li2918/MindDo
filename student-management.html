<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学员管理 | Student Management</title>
  <style>
    :root {
      --bg: #f6efe4;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --line-strong: rgba(208, 129, 36, 0.3);
      --primary: #f0a11f;
      --primary-deep: #8c3d14;
      --text: #4f2410;
      --muted: #8b6e58;
      --ok: #6f8f57;
      --warn: #d89c36;
      --danger: #c46a4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.28), transparent 32%),
        radial-gradient(circle at 86% 18%, rgba(244, 162, 38, 0.12), transparent 24%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 20px 46px;
    }

    .topbar,
    .hero,
    .panel,
    .student-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(123, 72, 24, 0.08);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .brand-copy { display: grid; gap: 4px; }
    .brand-copy strong { font-size: 19px; color: var(--primary-deep); }
    .brand-copy span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aa6a2b;
    }

    .nav-links,
    .lang-switch,
    .hero-actions,
    .filter-row,
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn,
    .search-input,
    .filter-select {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      text-decoration: none;
      outline: none;
    }

    .btn {
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover,
    .btn.active {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      border-color: rgba(208, 129, 36, 0.5);
      box-shadow: 0 10px 24px rgba(192, 123, 39, 0.18);
    }

    .hero,
    .panel {
      padding: 20px;
      margin-bottom: 16px;
    }

    .hero h1,
    .panel h2,
    .student-card h3 {
      margin: 0 0 10px;
      color: var(--primary-deep);
    }

    .hero h1 { font-size: clamp(26px, 4vw, 36px); }
    .muted { margin: 0; color: var(--muted); line-height: 1.6; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 248, 238, 0.84);
      border: 1px solid rgba(151, 84, 21, 0.12);
    }

    .metric span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 22px;
      color: var(--primary-deep);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) minmax(180px, 0.8fr) auto;
      gap: 10px;
      margin-top: 14px;
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .student-card {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .card-top,
    .card-meta,
    .kv-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill,
    .status-badge,
    .new-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(151, 84, 21, 0.14);
      background: rgba(255, 255, 255, 0.86);
    }

    .new-badge {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      color: var(--primary-deep);
      border-color: rgba(208, 129, 36, 0.28);
    }

    .status-badge.ok { color: var(--ok); }
    .status-badge.warn { color: var(--warn); }
    .status-badge.danger { color: var(--danger); }

    .kv-list {
      display: grid;
      gap: 8px;
    }

    .kv-row {
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 248, 238, 0.76);
      border: 1px solid rgba(151, 84, 21, 0.1);
      font-size: 13px;
    }

    .empty {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 248, 238, 0.84);
      border: 1px dashed rgba(151, 84, 21, 0.2);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .topbar { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .student-grid { grid-template-columns: 1fr; }
      .filter-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      .container { padding: 22px 14px 34px; }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="MindDo home">
        <img src="assets/logo.png" alt="Mindo AI logo" />
        <div class="brand-copy">
          <span>Mindo AI</span>
          <strong>Mindo AI</strong>
        </div>
      </a>
      <div class="nav-links">
        <a class="btn" href="dashboard.html" data-i18n="goDashboard"></a>
        <a class="btn" href="new-students.html" data-i18n="goNewStudents"></a>
        <a class="btn" href="request-center.html" data-i18n="goRequestCenter"></a>
      </div>
      <div class="lang-switch">
        <button class="btn" type="button" data-set-lang="zh-CN">中文</button>
        <button class="btn" type="button" data-set-lang="en">English</button>
      </div>
    </div>

    <section class="hero">
      <h1 data-i18n="title"></h1>
      <p class="muted" data-i18n="intro"></p>
      <div class="metrics" id="metrics"></div>
    </section>

    <section class="panel">
      <h2 data-i18n="filterTitle"></h2>
      <div class="filter-grid">
        <input class="search-input" id="searchInput" type="search" data-placeholder-i18n="searchPlaceholder" />
        <select class="filter-select" id="statusFilter">
          <option value="all">all</option>
          <option value="new">new</option>
          <option value="active">active</option>
          <option value="needsFollowUp">needsFollowUp</option>
        </select>
        <button class="btn" type="button" id="refreshBtn" data-i18n="refresh"></button>
      </div>
    </section>

    <section class="panel">
      <div class="filter-row">
        <h2 data-i18n="listTitle" style="margin:0;"></h2>
        <span class="pill" id="listCount">0</span>
      </div>
      <div class="student-grid" id="studentGrid"></div>
    </section>
  </main>

  <script src="assets/minddo-flow.js"></script>
  <script>
    (function () {
      var I18N = {
        "zh-CN": {
          goDashboard: "返回看板",
          goNewStudents: "新学员列表",
          goRequestCenter: "申请处理页",
          title: "学员管理",
          intro: "这里集中查看已注册学员、课程状态、最近反馈和待跟进事项，适合作为运营或教务的日常学员管理入口。",
          filterTitle: "筛选学员",
          searchPlaceholder: "搜索姓名、邮箱或学生 ID",
          refresh: "刷新列表",
          listTitle: "学员清单",
          metrics: {
            total: "总学员数",
            newToday: "今日新学员",
            active: "已选课学员",
            followUp: "待跟进学员"
          },
          statusMap: {
            active: "已进入正式学习",
            needsFollowUp: "待跟进",
            new: "新注册",
            noData: "资料待补充"
          },
          statusFilter: {
            all: "全部状态",
            new: "仅新注册",
            active: "仅正式学员",
            needsFollowUp: "仅待跟进"
          },
          labels: {
            email: "邮箱",
            plan: "课程方案",
            schedule: "排课信息",
            feedback: "最近反馈",
            source: "注册来源",
            assessment: "评估状态"
          },
          fallback: {
            noPlan: "尚未选课",
            noSchedule: "尚未排课",
            noFeedback: "暂无反馈",
            noAssessment: "未完成评估",
            noSource: "邮箱注册"
          },
          openProfile: "查看学员页",
          openRequestCenter: "查看申请",
          noData: "当前没有符合条件的学员。"
        },
        en: {
          goDashboard: "Back To Dashboard",
          goNewStudents: "New Student List",
          goRequestCenter: "Request Center",
          title: "Student Management",
          intro: "This page consolidates registered students, course status, recent feedback, and follow-up needs for daily operations.",
          filterTitle: "Filter Students",
          searchPlaceholder: "Search by name, email, or student ID",
          refresh: "Refresh",
          listTitle: "Student List",
          metrics: {
            total: "Total Students",
            newToday: "New Today",
            active: "Active Students",
            followUp: "Needs Follow-Up"
          },
          statusMap: {
            active: "Active Learning",
            needsFollowUp: "Needs Follow-Up",
            new: "New Registration",
            noData: "Profile Incomplete"
          },
          statusFilter: {
            all: "All Statuses",
            new: "New Only",
            active: "Active Only",
            needsFollowUp: "Needs Follow-Up"
          },
          labels: {
            email: "Email",
            plan: "Plan",
            schedule: "Schedule",
            feedback: "Latest Feedback",
            source: "Sign-Up Source",
            assessment: "Assessment"
          },
          fallback: {
            noPlan: "Not selected yet",
            noSchedule: "No schedule yet",
            noFeedback: "No feedback yet",
            noAssessment: "Assessment pending",
            noSource: "Email Sign-Up"
          },
          openProfile: "Open Profile",
          openRequestCenter: "Open Requests",
          noData: "There are no students matching this filter."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var metrics = document.getElementById("metrics");
      var searchInput = document.getElementById("searchInput");
      var statusFilter = document.getElementById("statusFilter");
      var refreshBtn = document.getElementById("refreshBtn");
      var studentGrid = document.getElementById("studentGrid");
      var listCount = document.getElementById("listCount");

      var state = {
        lang: localStorage.getItem("minddo_lang") === "en" ? "en" : "zh-CN",
        query: "",
        filter: "all"
      };

      function readJson(key) {
        try {
          return JSON.parse(localStorage.getItem(key) || "[]");
        } catch (_) {
          return [];
        }
      }

      function norm(v) {
        return String(v || "").trim().toLowerCase();
      }

      function safeDate(v) {
        var d = new Date(v);
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function latestFor(list, email, studentId) {
        return list
          .filter(function (item) {
            return (email && norm(item.email) === email) || (studentId && String(item.studentId || "") === studentId);
          })
          .sort(function (a, b) {
            return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
          })[0] || null;
      }

      function isToday(value) {
        var d = safeDate(value);
        if (!d) return false;
        var now = new Date();
        var start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        return d >= start;
      }

      function statusInfo(student, membership, assessment, feedback, lang) {
        var t = I18N[lang];
        if (membership) return { key: "active", text: t.statusMap.active, cls: "ok" };
        if (assessment || student.provider || student.email) return { key: "needsFollowUp", text: t.statusMap.needsFollowUp, cls: "warn" };
        if (isToday(student.createdAt)) return { key: "new", text: t.statusMap.new, cls: "danger" };
        return { key: "noData", text: t.statusMap.noData, cls: "warn" };
      }

      function render() {
        var t = I18N[state.lang];
        html.setAttribute("lang", state.lang);
        localStorage.setItem("minddo_lang", state.lang);
        document.title = t.title + " | MindDo";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) el.textContent = t[key];
        });

        searchInput.placeholder = t.searchPlaceholder;

        Array.from(statusFilter.options).forEach(function (option) {
          option.textContent = t.statusFilter[option.value] || option.value;
        });

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === state.lang);
        });

        var signups = readJson("minddo_signup_users");
        var memberships = readJson("minddo_membership_orders");
        var feedback = readJson("minddo_feedback");
        var assessments = readJson("minddo_assessments");

        var students = signups
          .slice()
          .sort(function (a, b) {
            return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
          })
          .map(function (student) {
            var email = norm(student.email);
            var studentId = String(student.studentId || "");
            var latestMembership = latestFor(memberships, email, studentId);
            var latestFeedback = latestFor(feedback, email, studentId);
            var latestAssessment = latestFor(assessments, email, studentId);
            var status = statusInfo(student, latestMembership, latestAssessment, latestFeedback, state.lang);
            return {
              student: student,
              membership: latestMembership,
              feedback: latestFeedback,
              assessment: latestAssessment,
              status: status,
              isNew: isToday(student.createdAt)
            };
          })
          .filter(function (entry) {
            var q = norm(state.query);
            var matchesQuery = !q || [entry.student.studentName, entry.student.email, entry.student.studentId].some(function (part) {
              return norm(part).indexOf(q) >= 0;
            });
            var matchesFilter = state.filter === "all" || entry.status.key === state.filter;
            return matchesQuery && matchesFilter;
          });

        var activeCount = signups.filter(function (student) {
          return !!latestFor(memberships, norm(student.email), String(student.studentId || ""));
        }).length;

        var followCount = signups.filter(function (student) {
          return !latestFor(memberships, norm(student.email), String(student.studentId || ""));
        }).length;

        var metricsData = [
          { label: t.metrics.total, value: signups.length },
          { label: t.metrics.newToday, value: signups.filter(function (s) { return isToday(s.createdAt); }).length },
          { label: t.metrics.active, value: activeCount },
          { label: t.metrics.followUp, value: followCount }
        ];

        metrics.innerHTML = metricsData.map(function (item) {
          return "<article class='metric'><span>" + item.label + "</span><strong>" + item.value + "</strong></article>";
        }).join("");

        listCount.textContent = students.length;

        if (!students.length) {
          studentGrid.innerHTML = "<div class='empty'>" + t.noData + "</div>";
          return;
        }

        studentGrid.innerHTML = students.map(function (entry) {
          var student = entry.student;
          var membership = entry.membership;
          var latestFeedback = entry.feedback;
          var latestAssessment = entry.assessment;
          var plan = membership ? (membership.plan || t.fallback.noPlan) : t.fallback.noPlan;
          var schedule = membership ? [membership.weekday || "", membership.timeSlot || ""].filter(Boolean).join(" · ") : t.fallback.noSchedule;
          var feedbackText = latestFeedback ? (latestFeedback.nextStep || latestFeedback.rating || t.fallback.noFeedback) : t.fallback.noFeedback;
          var assessmentText = latestAssessment ? (latestAssessment.level || latestAssessment.goal || "OK") : t.fallback.noAssessment;
          var source = student.provider || t.fallback.noSource;

          return [
            "<article class='student-card'>",
            "<div class='card-top'>",
            "<div>",
            "<h3>" + (student.studentName || "-") + "</h3>",
            "<p class='muted'>" + (student.studentId || "-") + "</p>",
            "</div>",
            "<div class='card-actions'>",
            entry.isNew ? "<span class='new-badge'>NEW</span>" : "",
            "<span class='status-badge " + entry.status.cls + "'>" + entry.status.text + "</span>",
            "</div>",
            "</div>",
            "<div class='kv-list'>",
            "<div class='kv-row'><span>" + t.labels.email + "</span><strong>" + (student.email || "-") + "</strong></div>",
            "<div class='kv-row'><span>" + t.labels.plan + "</span><strong>" + plan + "</strong></div>",
            "<div class='kv-row'><span>" + t.labels.schedule + "</span><strong>" + schedule + "</strong></div>",
            "<div class='kv-row'><span>" + t.labels.feedback + "</span><strong>" + feedbackText + "</strong></div>",
            "<div class='kv-row'><span>" + t.labels.assessment + "</span><strong>" + assessmentText + "</strong></div>",
            "<div class='kv-row'><span>" + t.labels.source + "</span><strong>" + source + "</strong></div>",
            "</div>",
            "<div class='card-actions'>",
            "<a class='btn' href='student-account.html?name=" + encodeURIComponent(student.studentName || "") + "&email=" + encodeURIComponent(student.email || "") + "'>" + t.openProfile + "</a>",
            "<a class='btn' href='request-center.html'>" + t.openRequestCenter + "</a>",
            "</div>",
            "</article>"
          ].join("");
        }).join("");
      }

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.lang = btn.getAttribute("data-set-lang");
          render();
        });
      });

      searchInput.addEventListener("input", function () {
        state.query = searchInput.value;
        render();
      });

      statusFilter.addEventListener("change", function () {
        state.filter = statusFilter.value;
        render();
      });

      refreshBtn.addEventListener("click", render);

      render();
    })();
  </script>
</body>
</html>
