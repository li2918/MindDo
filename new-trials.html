<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新注册试课列表 | New Trial Registrations</title>
  <style>
    :root {
      --bg: #f6efe4;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --primary-deep: #8c3d14;
      --muted: #8b6e58;
      --text: #4f2410;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.3), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(244, 162, 38, 0.14), transparent 24%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 42px;
    }
    .topbar, .hero, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 44px rgba(123, 72, 24, 0.08);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px 18px;
      margin-bottom: 14px;
    }
    .brand, .nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .brand { text-decoration: none; color: inherit; }
    .brand img { width: 56px; height: 56px; object-fit: contain; }
    .brand strong { color: var(--primary-deep); font-size: 18px; }
    .btn {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }
    .hero, .panel { padding: 18px; }
    .hero { margin-bottom: 14px; }
    .hero h1, .panel h2 { margin: 0 0 8px; color: var(--primary-deep); }
    .muted { margin: 0; color: var(--muted); line-height: 1.6; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid rgba(151, 84, 21, 0.12);
      border-radius: 14px;
    }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid rgba(151, 84, 21, 0.12);
      font-size: 13px;
    }
    th {
      background: rgba(255, 208, 118, 0.14);
      color: var(--primary-deep);
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="Mindo AI logo" />
        <strong>MindDo</strong>
      </a>
      <div class="nav">
        <a class="btn" href="dashboard.html">Dashboard</a>
        <a class="btn" href="trial.html">Trial</a>
      </div>
    </div>

    <section class="hero">
      <h1>新注册试课列表</h1>
      <p class="muted">展示今天新增的试课预约线索，方便运营快速确认时间、来源和跟进对象。</p>
    </section>

    <section class="panel">
      <h2>Today</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>学生</th>
              <th>邮箱</th>
              <th>科目</th>
              <th>渠道</th>
              <th>试课时间</th>
              <th>创建时间</th>
            </tr>
          </thead>
          <tbody id="trialTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    (function () {
      function readJson(key) {
        try { return JSON.parse(localStorage.getItem(key) || "[]"); }
        catch (_) { return []; }
      }
      function safeDate(v) {
        var d = new Date(v);
        return Number.isNaN(d.getTime()) ? null : d;
      }
      var startToday = new Date();
      startToday.setHours(0, 0, 0, 0);
      var rows = readJson("minddo_trial_leads").filter(function (item) {
        var d = safeDate(item.createdAt);
        return d && d >= startToday;
      }).sort(function (a, b) {
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      });
      var tbody = document.getElementById("trialTable");
      tbody.innerHTML = rows.length ? rows.map(function (item) {
        var trialTime = (item.trialDate || "-") + " " + (item.trialTime || "");
        var created = safeDate(item.createdAt);
        return "<tr><td>" + (item.studentName || "-") + "</td><td>" + (item.email || "-") + "</td><td>" + (item.subjectLabel || item.subject || "-") + "</td><td>" + (item.channelLabel || item.channel || "-") + "</td><td>" + trialTime + "</td><td>" + (created ? created.toLocaleString() : "-") + "</td></tr>";
      }).join("") : "<tr><td colspan='6'>今天暂无新注册试课。</td></tr>";
    })();
  </script>
</body>
</html>
